server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/url_shortener
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: shortener-analytics
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.urlshortener.kafka
        spring.json.value.default.type: com.example.urlshortener.kafka.ClickEvent

app:
  base-url: http://localhost:8080
  jwt:
    secret: change-me-this-is-a-very-long-256-bit-secret-key-please-replace
    expiration-ms: 86400000
  rate-limit:
    max-requests-per-minute: 60
  kafka:
    topic:
      click-events: click-events

logging:
  level:
    org.springframework.security: INFO
    org.apache.kafka: WARN
